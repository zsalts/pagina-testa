<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Expedientes | Testa CRM</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0284c7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Testa CRM">
    <link rel="apple-touch-icon" href="icono-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <div class="header-container">
            <div class="brand-id">
                <img src="IMG_2317.JPG" alt="Testa Equipamiento Médico" class="company-logo-img">
                <div class="header-titles">
                    <span class="company-name-text">Testa</span>
                    <p class="company-subtitle-text">Equipamiento Médico</p>
                </div>
            </div>
            <div class="header-actions">
                <span class="app-title-text">Expedientes</span>
                <div class="user-profile-circle"><i class="fa-solid fa-user-circle"></i></div>
            </div>
        </div>
    </header>

    <main>
        <a href="index.html" class="btn width-100"
            style="background: var(--testa-blue-dark); color: white; margin-bottom: 20px; text-decoration: none; padding: 14px; font-size: 15px; display: flex; justify-content: center; gap: 10px; box-shadow: var(--shadow-md);">
            <i class="fa-solid fa-arrow-left" style="font-size: 18px;"></i> ir a CRM Visitas
        </a>

        <section class="stats-section" style="margin-top: 15px;">
            <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--yellow-tint); color: var(--yellow-pending);"><i
                            class="fa-solid fa-hourglass-half"></i></div>
                    <div class="stat-data">
                        <h3 id="stat-pendientes">0</h3>
                        <p>Pendientes</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--green-tint); color: var(--green-success);"><i
                            class="fa-solid fa-check-circle"></i></div>
                    <div class="stat-data">
                        <h3 id="stat-aprobados">0</h3>
                        <p>Aprobados</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--red-tint); color: var(--red-alert);"><i
                            class="fa-solid fa-times-circle"></i></div>
                    <div class="stat-data">
                        <h3 id="stat-rechazados">0</h3>
                        <p>Rechazados</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="toolbar-section">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="buscador-presupuestos" placeholder="Buscar por médico o equipo...">
            </div>
            <div class="action-buttons">
                <button class="btn btn-add" id="btn-nuevo-presupuesto"><i class="fa-solid fa-plus-circle"></i> Iniciar
                    Expediente</button>
                <a href="https://drive.google.com/drive/folders/1W0K6c1pysbXS5cDYQrRi_sMJQLFVdtF_?usp=share_link"
                    target="_blank" class="btn"
                    style="background-color: #0f9d58; color: white; margin-left: 10px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;">
                    <i class="fa-brands fa-google-drive"></i> Mi Drive
                </a>
            </div>
        </section>

        <section class="content-section">
            <div class="table-card">
                <table class="testa-table">
                    <thead>
                        <tr>
                            <th>Médico / Institución</th>
                            <th>Fecha</th>
                            <th>Detalle</th>
                            <th>Estado</th>
                            <th>Documentación</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla-presupuestos"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modal-presupuesto">
        <div class="modal modern-modal">
            <div class="modal-header">
                <h3>Iniciar Nuevo Expediente</h3><button class="btn-close-modal"><i
                        class="fa-solid fa-times"></i></button>
            </div>
            <form id="form-presupuesto" class="modern-form">
                <div class="form-group">
                    <label>Médico / Institución</label>
                    <input list="lista-nombres-medicos" id="pres-medico" placeholder="Buscá o escribí el nombre..."
                        required>
                    <datalist id="lista-nombres-medicos"></datalist>
                </div>

                <div class="form-group">
                    <label style="color: var(--testa-blue-dark); font-weight: 600;"><i
                            class="fa-solid fa-handshake"></i> Vincular a una Visita (Opcional)</label>
                    <select id="pres-visita"
                        style="background: white; border: 2px solid var(--border-color); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; font-family: 'Inter', sans-serif;">
                        <option value="">-- Escribí un médico arriba primero --</option>
                    </select>
                </div>

                <div class="form-group"><label>Fecha de Envío</label><input type="date" id="pres-fecha" required></div>

                <div class="form-group">
                    <label style="color: var(--testa-blue-dark);"><i class="fa-solid fa-cloud-arrow-up"></i> Archivo del
                        Presupuesto (PDF)</label>
                    <input type="file" id="pres-archivo" accept=".pdf" required
                        style="background: white; border: 2px dashed var(--border-color); padding: 15px; cursor: pointer; width: 100%; box-sizing: border-box;">
                </div>

                <div class="form-group">
                    <label>Estado Inicial</label>
                    <select id="pres-estado">
                        <option value="pendiente">Pendiente</option>
                        <option value="aprobado">Aprobado</option>
                        <option value="rechazado">Rechazado</option>
                    </select>
                </div>

                <div class="form-group"><label>Equipos Incluidos / Notas</label><textarea id="pres-detalle"
                        placeholder="Ej: Monitor Multiparamétrico..."></textarea></div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-add width-100" style="padding: 15px; font-size: 16px;">
                        Guardar Presupuesto
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modal-archivo-extra">
        <div class="modal modern-modal">
            <div class="modal-header">
                <h3>Adjuntar Documentación</h3><button class="btn-close-modal"><i
                        class="fa-solid fa-times"></i></button>
            </div>
            <form id="form-archivo-extra" class="modern-form">
                <input type="hidden" id="extra-id">
                <input type="hidden" id="extra-carpeta">

                <div class="form-group">
                    <label>¿Qué documento vas a subir?</label>
                    <select id="extra-tipo" required>
                        <option value="OC_Cliente">Orden de Compra (Cliente)</option>
                        <option value="OC_Proveedor">Orden de Compra (Proveedor)</option>
                        <option value="Remito">Remito</option>
                        <option value="Recibo">Recibo de Cobro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-file-pdf"></i> Seleccionar PDF / Imagen</label>
                    <input type="file" id="extra-archivo" accept=".pdf,.jpg,.png" required
                        style="background: white; border: 2px dashed var(--border-color); padding: 15px; width: 100%; box-sizing: border-box;">
                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-add width-100" style="padding: 15px; font-size: 16px;">
                        Subir a la Carpeta
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="presupuesto.js"></script>
</body>

</html>
