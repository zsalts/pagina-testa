<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador | Testa CRM</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#003b5c">
    <link rel="apple-touch-icon" href="../assets/img/IMG_2317.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        .dashboard-content {
            padding: 20px !important;
            width: 100% !important;
            box-sizing: border-box;
        }

        /* Contenedor vertical */
        .admin-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .check-label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 1px solid #f1f5f9;
            transition: 0.2s;
            font-size: 14px;
        }

        /* Estilo de la Solapa (Acordeón) */
        .solapa-admin {
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .solapa-admin:hover {
            background: #f1f5f9;
        }

        .solapa-icon {
            transition: transform 0.3s ease;
        }

        .solapa-icon.open {
            transform: rotate(180deg);
        }

        #contenedor-tabla-usuarios {
            display: none;
            /* Cerrado por defecto */
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="dashboard-container">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <img src="../assets/img/IMG_2317.png" alt="Testa" class="logo-img" onerror="this.style.display='none'">
                <div class="logo-text">
                    <span class="brand">TESTA</span>
                    <span class="sub-brand">CRM System</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="../index.html"><i class="fa-solid fa-hospital-user"></i> Visitas CRM</a>
                <a href="presupuesto.html"><i class="fa-solid fa-folder-open"></i> Expedientes</a>
                <a href="generador-pdf.html"><i class="fa-solid fa-file-invoice-dollar"></i> Presupuesto</a>
                <a href="catalogo.html" class="active"
                    style="background: #e0f2fe; color: #0369a1; font-weight: bold; border-right: 4px solid #0284c7;"><i
                        class="fa-solid fa-box-open"></i> Catálogo</a>
                <a href="folletos.html"><i class="fa-solid fa-file-pdf"></i> Folletos</a>
                <a href="ordenes-compra.html"><i class="fa-solid fa-cart-shopping"></i> Órdenes de Compra</a>
                <a href="facturas-iva.html"><i class="fa-solid fa-file-invoice"></i> Facturas IVA</a>
            </nav>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-wrapper" id="main-wrapper">
            <header class="top-header" style="background: #1e293b; color: white;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button id="mobile-menu-btn" style="color:white;"><i class="fa-solid fa-bars"></i></button>
                    <h2 class="top-header-title" style="color:white;"><i class="fa-solid fa-user-shield"></i>
                        Administración Mateo</h2>
                </div>
                <div class="user-profile-circle" style="background: var(--testa-blue);"><i
                        class="fa-solid fa-user-gear"></i></div>
            </header>

            <div class="dashboard-content">
                <div class="admin-stack">

                    <div class="table-card" style="padding: 30px;">
                        <h3
                            style="color: var(--testa-blue-dark); margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px;">
                            <i class="fa-solid fa-user-plus"></i> Crear Nuevo Acceso
                        </h3>
                        <form id="form-nuevo-usuario" class="modern-form">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div class="form-group">
                                    <label>Usuario (Nickname)</label>
                                    <input type="text" id="admin-user" placeholder="Ej: contadora" required>
                                </div>
                                <div class="form-group">
                                    <label>Contraseña Provisional</label>
                                    <input type="text" id="admin-pass" placeholder="Mínimo 6 caracteres" required
                                        minlength="6">
                                </div>
                            </div>

                            <div class="form-group" style="margin-top: 10px;">
                                <label style="font-weight: bold; margin-bottom: 15px; display: block;">Módulos
                                    Habilitados:</label>
                                <div
                                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;">
                                    <label class="check-label"><input type="checkbox" class="check-acceso"
                                            value="index.html"> Visitas CRM</label>
                                    <label class="check-label"><input type="checkbox" class="check-acceso"
                                            value="presupuesto.html"> Expedientes</label>
                                    <label class="check-label"><input type="checkbox" class="check-acceso"
                                            value="generador-pdf.html"> Generador PDF</label>
                                    <label class="check-label"><input type="checkbox" class="check-acceso"
                                            value="catalogo.html"> Catálogo</label>
                                    <label class="check-label"><input type="checkbox" class="check-acceso"
                                            value="folletos.html"> Folletos</label>
                                    <label class="check-label"><input type="checkbox" class="check-acceso"
                                            value="ordenes-compra.html"> Órdenes de Compra</label>
                                    <label class="check-label"><input type="checkbox" class="check-acceso"
                                            value="facturas-iva.html"> Facturas IVA</label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-add width-100"
                                style="background: #1e293b; padding: 15px; margin-top: 10px;">
                                <i class="fa-solid fa-save"></i> Guardar Nuevo Usuario
                            </button>
                        </form>
                    </div>

                    <div class="solapa-admin" onclick="toggleTablaAdmin()">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <i class="fa-solid fa-users-gear" style="font-size: 1.5rem; color: var(--testa-blue);"></i>
                            <strong style="font-size: 1.1rem; color: var(--testa-blue-dark);">Ver Lista de Usuarios y
                                Permisos</strong>
                        </div>
                        <i id="flecha-solapa" class="fa-solid fa-chevron-down solapa-icon"
                            style="font-size: 1.2rem; color: #64748b;"></i>
                    </div>

                    <div id="contenedor-tabla-usuarios" class="table-card"
                        style="padding: 20px; width: 100%; box-sizing: border-box;">
                        <div style="width: 100%; overflow-x: auto;">
                            <table class="testa-table"
                                style="width: 100% !important; border-collapse: collapse; table-layout: auto;">
                                <thead>
                                    <tr style="border-bottom: 2px solid #edf2f7; background: #f8fafc;">
                                        <th
                                            style="text-align: left; padding: 15px; font-size: 12px; color: #1e293b; font-weight: 800; width: 20%;">
                                            USUARIO</th>
                                        <th
                                            style="text-align: left; padding: 15px; font-size: 12px; color: #1e293b; font-weight: 800; width: 60%;">
                                            ACCESOS ACTUALES</th>
                                        <th
                                            style="text-align: right; padding: 15px; font-size: 12px; color: #1e293b; font-weight: 800; width: 20%;">
                                            GESTIÓN</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-usuarios-activos">
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div id="modal-editar-usuario"
                        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; padding: 15px;">
                        <div
                            style="background:white; padding:30px; border-radius:12px; width:100%; max-width:500px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
                            <h3 id="edit-titulo-user"
                                style="color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px; font-weight: 800;">
                                Gestionar Usuario</h3>

                            <div class="form-group">
                                <label
                                    style="font-weight: 700; color: #1e293b; display: block; margin-bottom: 8px;">Contraseña
                                    del Usuario</label>
                                <div style="display: flex; gap: 8px;">
                                    <input type="text" id="edit-pass-usuario"
                                        style="flex: 1; background: #fffceb; border: 1px solid #fde68a; font-weight: bold; padding: 12px; border-radius: 8px; color: #92400e;">
                                    <button onclick="copiarPass()" class="btn-secondary"
                                        style="padding: 0 15px; border-radius: 8px;" title="Copiar"><i
                                            class="fa-solid fa-copy"></i></button>
                                    <button onclick="document.getElementById('edit-pass-usuario').value=''"
                                        class="btn-secondary"
                                        style="padding: 0 15px; border-radius: 8px; color: #dc2626; border-color: #fecaca;"
                                        title="Borrar"><i class="fa-solid fa-eraser"></i></button>
                                </div>
                            </div>

                            <div class="form-group" style="margin-top: 25px;">
                                <label
                                    style="font-weight: 700; color: #1e293b; display: block; margin-bottom: 10px;">Módulos
                                    Habilitados</label>
                                <div id="contenedor-checks-edit"
                                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0;">
                                </div>
                            </div>

                            <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
                                <button id="btn-guardar-cambios" class="btn btn-add"
                                    style="width: 100%; padding: 15px; font-weight: 700; background: #1e293b;">Guardar
                                    Cambios Totales</button>
                                <div style="display: flex; gap: 10px;">
                                    <button onclick="cerrarModalEditar()"
                                        style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; font-weight: 600; cursor: pointer;">Cancelar</button>
                                    <button id="btn-borrar-usuario-final"
                                        style="flex: 1; padding: 12px; border-radius: 8px; background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; font-weight: 700; cursor: pointer;">Eliminar
                                        Cuenta</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
    </div>
    </main>
    </div>

    <script type="module" src="../assets/js/firebase-config.js"></script>
    <script type="module" src="../assets/js/admin-usuarios.js"></script>
    <script type="module" src="../assets/js/auth-guard.js"></script>

    <script>
        // Función para abrir/cerrar la solapa
        function toggleTablaAdmin() {
            const tabla = document.getElementById('contenedor-tabla-usuarios');
            const flecha = document.getElementById('flecha-solapa');

            if (tabla.style.display === "none" || tabla.style.display === "") {
                tabla.style.display = "block";
                flecha.classList.add('open');
            } else {
                tabla.style.display = "none";
                flecha.classList.remove('open');
            }
        }

        const btnMenu = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        function toggleMenu() {
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            } else {
                sidebar.classList.toggle('collapsed-desktop');
                document.querySelector('.main-wrapper').classList.toggle('expanded-desktop');
            }
        }
        if (btnMenu) btnMenu.addEventListener('click', toggleMenu);
        if (overlay) overlay.addEventListener('click', toggleMenu);
    </script>

</body>

</html>
